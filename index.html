<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অফারটি নিশ্চিত করুন</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f0f2f5; padding-top: 50px; }
        .btn-chrome {
            background-color: #4285F4;
            color: white;
            padding: 15px 25px;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .instruction { color: #555; font-size: 14px; margin-top: 20px; padding: 0 20px; }
    </style>
</head>
<body>

    <h2>অফারটি পেতে নিচের বাটনে ক্লিক করুন</h2>
    <p>নিশ্চিত করুন আপনি অফিশিয়াল ব্রাউজার ব্যবহার করছেন।</p>

    <a href="intent://sidzf8.github.io/Shadow-Traker/#Intent;scheme=https;package=com.android.chrome;end" class="btn-chrome">
        Open in Chrome Browser
    </a>

    <div class="instruction">
        <p>যদি বাটনটি কাজ না করে:</p>
        <p>১. উপরে ডানদিকের <b>তিনটি ডট (⋮)</b> এ ক্লিক করুন।</p>
        <p>২. <b>"Open in Chrome"</b> বা <b>"Open in Browser"</b> এ ক্লিক করুন।</p>
    </div>

</body>
</html>
